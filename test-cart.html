<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Test - ThriftSass</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            background: #f5f5f5;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            font-family: monospace;
            white-space: pre-wrap;
        }
        .success { border-left: 4px solid #28a745; }
        .error { border-left: 4px solid #dc3545; }
        .product-card {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .product-card img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 5px;
        }
        .add-to-cart {
            background: #28a745;
        }
        .add-to-cart:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <h1>🛒 Cart Functionality Test</h1>
    
    <div class="test-section">
        <h2>Test 1: Check if Cart API is Working</h2>
        <button onclick="testCartAPI()">Test Cart API</button>
        <div id="api-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 2: View Current Cart</h2>
        <button onclick="viewCart()">View Cart</button>
        <div id="cart-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 3: Add Product to Cart (Simulated)</h2>
        <div class="product-card" data-id="0">
            <img src="/assets/download2.jpeg" alt="Blue Polka Top">
            <div>
                <h3 class="product-title">Blue Polka Top</h3>
                <p class="product-price">Rs 899</p>
                <button class="add-to-cart" onclick="addToCartTest(this)">Add to Cart</button>
            </div>
        </div>
        <div id="add-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 4: Load Products from API</h2>
        <button onclick="loadProducts()">Load Products</button>
        <div id="products-container"></div>
    </div>

    <script>
        // Test 1: Test Cart API
        async function testCartAPI() {
            const resultDiv = document.getElementById('api-result');
            resultDiv.textContent = 'Testing...';
            resultDiv.className = 'result';
            
            try {
                const response = await fetch('/cart/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({
                        productId: '999',
                        productName: 'Test Product',
                        productPrice: 100,
                        productImage: '/test.jpg',
                        quantity: 1
                    })
                });
                
                const data = await response.json();
                resultDiv.textContent = 'Success!\n' + JSON.stringify(data, null, 2);
                resultDiv.className = 'result success';
            } catch (err) {
                resultDiv.textContent = 'Error!\n' + err.message;
                resultDiv.className = 'result error';
            }
        }

        // Test 2: View Cart
        async function viewCart() {
            const resultDiv = document.getElementById('cart-result');
            resultDiv.textContent = 'Loading...';
            resultDiv.className = 'result';
            
            try {
                const response = await fetch('/cart/json');
                const data = await response.json();
                resultDiv.textContent = 'Cart Contents:\n' + JSON.stringify(data, null, 2);
                resultDiv.className = 'result success';
            } catch (err) {
                resultDiv.textContent = 'Error!\n' + err.message;
                resultDiv.className = 'result error';
            }
        }

        // Test 3: Add to Cart (Simulated)
        async function addToCartTest(button) {
            const resultDiv = document.getElementById('add-result');
            const card = button.closest('.product-card');
            const productId = card.getAttribute('data-id');
            const name = card.querySelector('.product-title').textContent;
            const priceText = card.querySelector('.product-price').textContent;
            const price = parseFloat(priceText.replace(/[^\d.]/g, '')) || 0;
            const image = card.querySelector('img').src;
            
            resultDiv.textContent = 'Adding to cart...';
            resultDiv.className = 'result';
            
            try {
                const response = await fetch('/cart/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({
                        productId,
                        productName: name,
                        productPrice: price,
                        productImage: image,
                        quantity: 1
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    resultDiv.textContent = `✅ ${name} added to cart!\nPrice: ₹${price}\nResponse: ${JSON.stringify(data, null, 2)}`;
                    resultDiv.className = 'result success';
                    alert(`${name} added to cart!`);
                } else {
                    resultDiv.textContent = 'Failed to add to cart';
                    resultDiv.className = 'result error';
                }
            } catch (err) {
                resultDiv.textContent = 'Error!\n' + err.message;
                resultDiv.className = 'result error';
            }
        }

        // Test 4: Load Products
        async function loadProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = '<p>Loading products...</p>';
            
            try {
                const response = await fetch('/api/products');
                const products = await response.json();
                
                container.innerHTML = '';
                products.slice(0, 3).forEach(product => {
                    const imgPath = product.image || product.image_url || '';
                    container.innerHTML += `
                        <div class="product-card" data-id="${product.id}">
                            <img src="${imgPath}" alt="${product.name}">
                            <div>
                                <h3 class="product-title">${product.name}</h3>
                                <p class="product-price">Rs ${product.price}</p>
                                <button class="add-to-cart" onclick="addToCartTest(this)">Add to Cart</button>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                container.innerHTML = `<p class="error">Error loading products: ${err.message}</p>`;
            }
        }

        // Auto-run tests on load
        window.onload = () => {
            console.log('Cart test page loaded');
            console.log('Click buttons to test cart functionality');
        };
    </script>
</body>
</html>
